{% extends "rfp/base_admin.html" %}
{% block content %}
{% load static %}

<div class="page-header">
  <h2>RFP Select Category</h2>
  <div class="breadcrumb">Home <span>/</span> RFP <span>/</span> RFP Select Category</div>
</div>

<div class="card">
  <div class="card-head">
    <h3>RFP Select Category</h3>
  </div>

  {% if messages %}
    <div class="msg-wrap">
      {% for message in messages %}
        <div class="msg {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div class="form-row">
      <div class="form-group" style="max-width:480px;">
        <label>Categories<span>*</span></label>
        <select name="category" required>
          <option value="">Select category</option>
          {% for c in categories %}
            <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="button-row" style="display:flex; justify-content:flex-end; gap:10px;">
      <button type="submit" class="btn-primary">Submit</button>
      <a class="btn-secondary" href="{% url 'admin_rfp_list' %}">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
