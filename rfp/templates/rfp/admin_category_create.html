{% extends "rfp/base_admin.html" %}
{% block content %}

<div class="page-header">
  <h2>Add Category</h2>
  <div class="breadcrumb">Home <span>/</span> Categories <span>/</span> Add</div>
</div>

<div class="card">
  <div class="card-head">
    <h3>Add Category</h3>
  </div>

  {% if error %}
    <div class="msg error">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group" style="max-width:420px;">
        <label>Category name <span>*</span></label>
        <input type="text" name="name" required>
      </div>
    </div>

    <div class="button-row" style="display:flex; justify-content:flex-end; gap:10px;">
      <button type="submit" class="btn-primary">Save</button>
      <a class="btn-secondary" href="{% url 'admin_categories' %}">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
