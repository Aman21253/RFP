{% extends "rfp/base_vendor.html" %}
{% load static %}

{% block content %}
<div class="wrap">

  <!-- Top header like screenshot -->
  <div class="topbar">
    <div class="title-block">
      <h2 class="page-title">RFP Create</h2>
    </div>
    <div class="crumbs">Home &nbsp;/&nbsp; RFP &nbsp;/&nbsp; quotes Create</div>
  </div>

  <div class="card">
    <form method="post" class="form">
      {% csrf_token %}

      <!-- Row 1 -->
      <div class="row full">
        <label class="lbl">vendor Price <span class="req">*</span></label>
        <input
          type="number"
          step="0.01"
          min="0"
          name="vendor_price"
          id="vendor_price"
          class="inp"
          placeholder=""
          required
        />
      </div>

      <!-- Row 2 -->
      <div class="row full">
        <label class="lbl">Item Description <span class="req">*</span></label>
        <input
          type="text"
          name="item_name"
          id="item_name"
          class="inp"
          placeholder=""
          required
        />
      </div>

      <!-- Row 3: two columns -->
      <div class="grid2">
        <div class="row">
          <label class="lbl">Quantity <span class="req">*</span></label>
          <input
            type="number"
            min="1"
            name="quantity"
            id="quantity"
            class="inp"
            value="1"
            required
          />
        </div>

        <div class="row">
          <label class="lbl">Total Cost <span class="req">*</span></label>
          <input
            type="text"
            id="total_cost"
            class="inp"
            value="0.00"
            readonly
          />
        </div>
      </div>

      <!-- Buttons bottom-right -->
      <div class="actions">
        <button type="submit" class="btn btn-primary">Submit</button>
        <a href="{% url 'vendor_rfp_for_quotes' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>

</div>

<style>
  /* Outer spacing same feel */
  .wrap{
    padding: 22px 26px;
  }

  .topbar{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom: 14px;
  }
  .page-title{
    margin:0;
    font-size: 20px;
    font-weight: 700;
    color:#222;
  }
  .crumbs{
    font-size: 12px;
    color:#8a8a8a;
    margin-top: 6px;
  }

  /* Card look */
  .card{
    background:#fff;
    border: 1px solid #ececec;
    border-radius: 6px;
    padding: 22px;
    max-width: 980px;        /* similar center width */
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }

  .form{
    width: 100%;
  }

  .row{
    margin-bottom: 16px;
  }

  .row.full .inp{
    width: 100%;
  }

  .lbl{
    display:block;
    font-size: 12px;
    font-weight: 600;
    color:#333;
    margin-bottom: 6px;
    text-transform: none; /* screenshot text style */
  }
  .req{
    color:#d64545;
    font-weight:700;
  }

  .inp{
    height: 38px;
    border: 1px solid #dcdcdc;
    border-radius: 3px;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
    background: #fff;
    box-sizing: border-box;
  }
  .inp:focus{
    border-color:#7aa7ff;
    box-shadow: 0 0 0 3px rgba(122,167,255,.15);
  }

  /* Two column row like screenshot */
  .grid2{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    margin-top: 8px;
  }

  /* Buttons bottom right */
  .actions{
    display:flex;
    justify-content:flex-end;
    gap: 10px;
    margin-top: 14px;
  }

  .btn{
    height: 34px;
    padding: 0 14px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border: none;
  }
  .btn-primary{
    background:#2e77ff;
    color:#fff;
  }
  .btn-primary:hover{
    filter: brightness(.95);
  }
  .btn-secondary{
    background:#6c757d;
    color:#fff;
  }
  .btn-secondary:hover{
    filter: brightness(.95);
  }

  /* Small responsive */
  @media (max-width: 900px){
    .card{ max-width: 100%; }
    .grid2{ grid-template-columns: 1fr; }
  }
</style>

<script>
  // Auto-calc total cost = vendor_price * quantity
  function calcTotal(){
    const price = parseFloat(document.getElementById("vendor_price").value || "0");
    const qty = parseInt(document.getElementById("quantity").value || "0", 10);
    const total = (price * qty) || 0;
    document.getElementById("total_cost").value = total.toFixed(2);
  }

  document.getElementById("vendor_price").addEventListener("input", calcTotal);
  document.getElementById("quantity").addEventListener("input", calcTotal);
  calcTotal();
</script>
{% endblock %}
