{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Vendor Registration</title>
  <link rel="stylesheet" href="{% static 'css/vendor.css' %}">
</head>
<body>

<div class="container">
  <div class="card">

    <div class="card-header">
      <h2>Welcome to RFP System!</h2>
      <p>Register as Vendor</p>
    </div>

    <div class="card-body">

      {% if messages %}
        <div class="msg-wrap">
          {% for message in messages %}
            <div class="msg {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" action="{% url 'vendor_signup' %}">
        {% csrf_token %}

        <div class="form-row">
          <div class="form-group">
            <label>First name<span>*</span></label>
            <input type="text" name="f_name" placeholder="Enter Firstname" required>
          </div>
          <div class="form-group">
            <label>Last Name<span>*</span></label>
            <input type="text" name="l_name" placeholder="Enter Lastname" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full">
            <label>Email<span>*</span></label>
            <input type="email" name="email" placeholder="Enter Email" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Password<span>*</span></label>
            <input type="password" name="password" placeholder="Enter Password" required>
          </div>
          <div class="form-group">
            <label>Confirm Password<span>*</span></label>
            <input type="password" name="confirm_password" placeholder="Enter Confirm Password" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Revenue (Last 3 Years in Lacks)<span>*</span></label>
            <input type="text" name="revenue" placeholder="Enter Revenue" required>
          </div>
          <div class="form-group">
            <label>No of Employees<span>*</span></label>
            <input type="number" name="employees" placeholder="No of Employees" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>GST No<span>*</span></label>
            <input type="text" name="gst" placeholder="Enter GST No" required>
          </div>
          <div class="form-group">
            <label>PAN No<span>*</span></label>
            <input type="text" name="pan" placeholder="Enter PAN No" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Phone No<span>*</span></label>
            <input type="text" name="phone" placeholder="Enter Phone No" required>
          </div>

          <div class="form-group">
            <label>Categories<span>*</span></label>
            <select name="category_id" required>
              <option value="" selected disabled>Select Category</option>
              {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="button-row">
          <button type="submit">Register</button>
        </div>

      </form>

    </div>
  </div>
</div>

</body>
</html>
