{% extends "rfp/base_admin.html" %}
{% block content %}

<form method="post">
{% csrf_token %}

<div class="card-box">

  <div class="form-grid">

    <!-- Row 1 -->
    <div class="form-group">
      <label>Item Name <span>*</span></label>
      <input type="text" name="title" required>
    </div>

    <div class="form-group">
      <label>Item Description <span>*</span></label>
      <input type="text" name="description">
    </div>

    <div class="form-group">
      <label>Quantity <span>*</span></label>
      <input type="number" name="quantity">
    </div>

    <!-- Row 2 -->
    <div class="form-group">
      <label>Last Date <span>*</span></label>
      <input type="date" name="last_date" class="date-compact" required>
    </div>

    <div class="form-group">
      <label>Minimum Price <span>*</span></label>
      <input type="number" step="0.01" name="min_amount" required>
    </div>

    <div></div> <!-- empty for alignment -->

    <!-- Row 3 -->
    <div class="form-group">
      <label>Maximum Price <span>*</span></label>
      <input type="number" step="0.01" name="max_amount" required>
    </div>

    <div class="form-group vendor-small">
      <label>Select Vendors <span>*</span></label>
      <select name="vendors" multiple required>
        {% for v in vendors %}
          <option value="{{ v.id }}">
            {{ v.first_name }} {{ v.last_name }}
          </option>
        {% endfor %}
      </select>
    </div>

  </div>

  <!-- Buttons OUTSIDE GRID -->
  <div class="btn-row">
    <button type="submit" class="btn-primary">Submit</button>
    <a href="{% url 'admin_rfp_list' %}" class="btn-secondary">Cancel</a>
  </div>

</div>

</form>

{% endblock %}
